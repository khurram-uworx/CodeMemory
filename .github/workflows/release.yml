name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            suffix: .exe
          # Future: linux-x64, osx-x64, osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish self-contained single-file
      run: dotnet publish src/CodeMemory.Mcp/CodeMemory.Mcp.csproj -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishSingleFile=true

    - name: Rename binary for release
      shell: pwsh
      run: |
        $source = "src/CodeMemory.Mcp/bin/Release/net10.0/${{ matrix.rid }}/publish/CodeMemory.Mcp.exe"
        $dest = "code-memory-${{ matrix.rid }}${{ matrix.suffix }}"
        Move-Item -LiteralPath $source -Destination $dest -Force

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: CodeMemory ${{ github.ref_name }}
        files: code-memory-${{ matrix.rid }}${{ matrix.suffix }}
        fail_on_unmatched_files: true
